version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/gateway"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/cli"
    schedule:
      interval: "weekly"

  - package-ecosystem: "terraform"
    directory: "/infra/terraform/environments/prod"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/gateway"
    schedule:
      interval: "weekly"
